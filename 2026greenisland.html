
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 今夏辣一波綠島 🤿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --ocean: #0a5c7a;
    --ocean-mid: #1a9bbf;
    --ocean-light: #4dd4f0;
    --foam: #e8f7fc;
    --sand: #f5edd8;
    --sand-dark: #d4b870;
    --coral: #e05a3a;
    --coral-light: #f5c4b5;
    --ink: #0a2a3a;
    --muted: #5a8a9a;
    --white: #ffffff;
    --success: #1a9bbf;
    --success-bg: #e0f5fb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #0a2a3a;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-wrap {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
    /* 藍天→海水→沙灘 三層漸層 */
    background: linear-gradient(
      180deg,
      #87ceeb 0%,
      #4fb8d8 25%,
      #1a9bbf 45%,
      #0e7fa3 58%,
      #c8a96e 72%,
      #e2c07a 82%,
      #f0d48a 100%
    );
  }
  /* 太陽 */
  .bg-wrap::before {
    content: '';
    position: absolute;
    top: 24px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 90px;
    background: radial-gradient(circle, #fff9c4 30%, #ffe066 60%, rgba(255,220,50,0) 100%);
    border-radius: 50%;
    box-shadow: 0 0 60px 30px rgba(255,230,80,0.35), 0 0 120px 60px rgba(255,200,50,0.15);
    animation: sun-pulse 4s ease-in-out infinite alternate;
  }
  @keyframes sun-pulse {
    from { transform: translateX(-50%) scale(1);    opacity: 0.9; }
    to   { transform: translateX(-50%) scale(1.08); opacity: 1;   }
  }
  /* 海浪白沫 */
  .bg-wrap::after {
    content: '';
    position: absolute;
    bottom: 26%; left: -10%; right: -10%;
    height: 32px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    filter: blur(8px);
    animation: foam 3.5s ease-in-out infinite alternate;
  }
  @keyframes foam {
    from { transform: scaleX(1)   translateY(0);   opacity: 0.3; }
    to   { transform: scaleX(1.04) translateY(6px); opacity: 0.55; }
  }
  .wave {
    position: absolute; width: 200%; height: 200%;
    border-radius: 45%;
    animation: wave-spin linear infinite;
  }
  .wave-1 { background: rgba(255,255,255,0.07); bottom: -82%; left: -50%; animation-duration: 20s; }
  .wave-2 { background: rgba(200,240,255,0.06); bottom: -86%; left: -42%; animation-duration: 28s; animation-direction: reverse; }
  .wave-3 { background: rgba(255,255,255,0.04); bottom: -90%; left: -58%; animation-duration: 36s; }
  @keyframes wave-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  .page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 4rem 1rem 3rem;
  }
  .hero-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.55);
    text-shadow: 0 1px 4px rgba(0,50,90,0.3);
    background: rgba(0,80,130,0.2);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 16px rgba(0,60,100,0.35), 0 1px 4px rgba(0,40,80,0.25);
  }
  .hero h1 span { color: #ff8c38; text-shadow: 0 2px 16px rgba(255,120,30,0.5); }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 6px rgba(0,50,90,0.3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    margin-bottom: 2.5rem;
  }

  /* ── SEARCH BOX ── */
  .search-card {
    background: rgba(0,50,90,0.3);
    border: 1px solid rgba(77,212,240,0.35);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 2rem;
    max-width: 420px;
    margin: 0 auto;
  }
  .search-label {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 6px rgba(0,50,90,0.3);
    margin-bottom: 10px;
    display: block;
  }
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(77,212,240,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input::placeholder { color: rgba(255,255,255,0.3); }
  .search-row input:focus { border-color: #4dd4f0; box-shadow: 0 0 0 3px rgba(77,212,240,0.2); }
  .search-btn {
    background: #1a9bbf;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #0e7fa3; }
  .search-btn:active { transform: scale(0.97); }

  .error-msg {
    margin-top: 10px;
    font-size: 13px;
    color: #f5a4a4;
    display: none;
  }

  /* ── RESULT ── */
  #result { margin-top: 2rem; display: none; }

  .person-header {
    display: flex; align-items: center; gap: 16px;
    background: rgba(0,40,70,0.4);
    border: 1px solid rgba(77,212,240,0.25);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #1a9bbf, #4dd4f0);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: white;
    font-family: 'Noto Serif TC', serif;
    flex-shrink: 0;
  }
  .person-name { font-size: 20px; font-weight: 600; font-family: 'Noto Serif TC', serif; }
  .person-meta { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* ── SECTION ── */
  .section { margin-bottom: 1.25rem; }
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ffffff;
    text-shadow: 0 1px 6px rgba(0,60,100,0.4);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .card {
    background: rgba(0,40,70,0.35);
    border: 1px solid rgba(77,212,240,0.2);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    overflow: hidden;
  }
  .card-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .card-row:last-child { border-bottom: none; }

  .badge {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 8px;
    font-weight: 500; white-space: nowrap; flex-shrink: 0;
  }
  .badge-go { background: rgba(0,100,160,0.4); color: #b8eeff; border: 1px solid rgba(77,212,240,0.45); }
  .badge-back { background: rgba(224,90,58,0.15); color: #f0956f; border: 1px solid rgba(224,90,58,0.3); }
  .badge-tbd { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.1); }

  .row-main { font-size: 15px; font-weight: 500; }
  .row-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }

  .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .room-cell {
    padding: 16px 18px;
    border-right: 1px solid rgba(255,255,255,0.06);
    border-bottom: none;
  }
  .room-cell:last-child { border-right: none; }
  .room-label { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.65); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
  .room-name { font-size: 15px; font-weight: 500; }
  .room-type { font-size: 12px; color: #7de8ff; margin-top: 3px; font-weight: 500; }
  .room-tbd { font-size: 14px; color: rgba(255,255,255,0.25); font-style: italic; }
  .room-mates { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 5px; }

  /* ── ITINERARY ── */
  .days-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: nowrap; }
  .day-tab {
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 6px 0; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.15s;
    flex: 1; text-align: center;
  }
  .day-tab.active, .day-tab:hover {
    background: #1a9bbf; color: #fff;
    border-color: #1a9bbf; font-weight: 500;
  }
  .day-content { display: none; }
  .day-content.active { display: block; }

  .timeline { padding: 4px 0; }
  .tl-item {
    display: flex; gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    align-items: flex-start;
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-time {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: #7de8ff;
    text-shadow: 0 1px 4px rgba(0,60,100,0.3); min-width: 44px; padding-top: 2px; font-weight: 500;
    flex-shrink: 0;
  }
  .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 6px; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: #4dd4f0; flex-shrink: 0; }
  .tl-dot.special { background: var(--coral); width: 10px; height: 10px; }
  .tl-line { width: 1px; flex: 1; background: rgba(255,255,255,0.12); min-height: 20px; margin-top: 4px; }
  .tl-text { font-size: 14px; line-height: 1.5; }
  .tl-text strong { color: var(--ocean-light); font-weight: 500; }
  .tl-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px;
    margin-left: 6px; vertical-align: middle;
    background: rgba(0,100,160,0.4); color: #b8eeff;
    border: 1px solid rgba(77,212,240,0.4);
  }
  .tl-tag.event { background: rgba(224,90,58,0.12); color: #f0956f; border-color: rgba(224,90,58,0.2); }
  .tl-tag.scuba { background: rgba(120,220,100,0.12); color: #88e06a; border-color: rgba(120,220,100,0.35); }

  /* ── 潛點 POP UP ── */
  .spot-btn {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 8px; border-radius: 6px;
    background: rgba(0,100,160,0.35); color: #7de8ff;
    border: 1px solid rgba(77,212,240,0.3);
    cursor: pointer; margin-left: 6px; vertical-align: middle;
    transition: all 0.15s;
  }
  .spot-btn:hover { background: rgba(0,100,160,0.6); color: #b8eeff; }

  .popup-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,20,40,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 1rem;
  }
  .popup-overlay.open { display: flex; }
  .popup-box {
    background: linear-gradient(160deg, #0a3a5a 0%, #0a2a3a 100%);
    border: 1px solid rgba(77,212,240,0.3);
    border-radius: 20px; padding: 1.5rem;
    max-width: 360px; width: 100%; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: popup-in 0.2s ease;
  }
  @keyframes popup-in {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .popup-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 20px; cursor: pointer; line-height: 1;
    transition: color 0.15s;
  }
  .popup-close:hover { color: rgba(255,255,255,0.8); }
  .popup-tag {
    font-size: 10px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #ff8c38; margin-bottom: 8px;
  }
  .popup-title {
    font-size: 18px; font-weight: 600;
    font-family: 'Noto Serif TC', serif;
    color: #fff; margin-bottom: 12px;
  }
  .popup-desc {
    font-size: 14px; line-height: 1.7;
    color: rgba(255,255,255,0.75); margin-bottom: 16px;
  }
  .popup-map-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; padding: 8px 16px; border-radius: 10px;
    background: rgba(0,100,160,0.4); color: #7de8ff;
    border: 1px solid rgba(77,212,240,0.35);
    text-decoration: none; transition: all 0.15s;
  }
  .popup-map-btn:hover { background: rgba(0,100,160,0.65); color: #b8eeff; }

  /* ── Check List ── */
  .checklist-section { margin-top: 1.25rem; }
  .checklist-group { margin-bottom: 6px; }
  .checklist-group-title {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .checklist-group-title:hover { background: rgba(255,255,255,0.1); }
  .checklist-group-title .cl-arrow {
    font-size: 10px; color: rgba(255,255,255,0.35);
    transition: transform 0.2s;
  }
  .checklist-group-title .cl-count {
    font-size: 11px; color: rgba(255,255,255,0.3);
    margin-left: 8px;
  }
  .checklist-group-title.open .cl-arrow { transform: rotate(180deg); }
  .checklist-group-title.open { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
  .checklist-items {
    display: none; flex-wrap: wrap; gap: 8px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1); border-top: none;
    border-radius: 0 0 10px 10px;
    margin-bottom: 2px;
  }
  .checklist-items.open { display: flex; }
  .check-item {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 7px 12px;
    cursor: pointer; transition: all 0.15s; user-select: none;
    font-size: 13px; color: rgba(255,255,255,0.7);
  }
  .check-item:hover { background: rgba(255,255,255,0.1); }
  .check-item.checked {
    background: rgba(0,100,160,0.35);
    border-color: rgba(77,212,240,0.4);
    color: #b8eeff;
  }
  .check-item.checked .check-box { background: #1a9bbf; border-color: #1a9bbf; }
  .check-item.checked .check-box::after { display: block; }
  .check-box {
    width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent; position: relative; transition: all 0.15s;
  }
  .check-box::after {
    content: ''; display: none;
    position: absolute; left: 4px; top: 1px;
    width: 5px; height: 9px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .dive-spot {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: rgba(255,255,255,0.55);
    margin-top: 5px;
  }
  .dive-spot a {
    display: inline-flex; align-items: center; gap: 4px;
    color: #7de8ff; text-decoration: none;
    font-size: 12px; padding: 3px 8px;
    background: rgba(0,100,160,0.35);
    border: 1px solid rgba(77,212,240,0.3);
    border-radius: 6px; transition: all 0.15s;
  }
  .dive-spot a:hover {
    background: rgba(0,100,160,0.55);
    border-color: rgba(77,212,240,0.6);
    color: #b8eeff;
  }
  .dive-spot a svg { flex-shrink: 0; }

  .notice-box {
    background: rgba(91,188,214,0.08);
    border: 1px solid rgba(91,188,214,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    font-style: italic;
  }

  /* ── FOOTER / RESET ── */
  .reset-btn {
    display: block; width: 100%; margin-top: 2rem;
    background: transparent; border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.35); border-radius: 12px;
    padding: 12px; font-size: 13px; font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.65); }

  .suggest-list {
    margin-top: 10px; display: none;
    background: rgba(0,40,70,0.85);
    border: 1px solid rgba(77,212,240,0.3);
    border-radius: 12px; padding: 10px;
  }
  .suggest-item {
    display: block; width: 100%;
    background: transparent; border: none;
    color: var(--white); font-family: 'Outfit', sans-serif;
    font-size: 14px; text-align: left;
    padding: 9px 12px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
  }
  .suggest-item:hover { background: rgba(77,212,240,0.12); }

  /* ── COUNTDOWN ── */
  .countdown-wrap {
    display: flex; gap: 12px; justify-content: center;
    margin: 1.5rem 0 2rem;
  }
  .cd-unit {
    text-align: center;
    background: rgba(0,50,90,0.35);
    border: 1px solid rgba(77,212,240,0.35);
    border-radius: 14px; padding: 12px 16px;
    min-width: 72px; backdrop-filter: blur(8px);
  }
  .cd-num {
    font-size: 30px; font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: #4dd4f0;
    text-shadow: 0 0 24px rgba(77,212,240,0.6);
    line-height: 1;
  }
  .cd-label {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-family: 'DM Mono', monospace; margin-top: 4px;
  }
  .cd-gone-msg {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; color: #4dd4f0;
    text-shadow: 0 0 20px rgba(77,212,240,0.5);
    margin: 1rem 0 2rem; letter-spacing: 0.05em;
  }

  /* ── WEATHER ── */
  .weather-section { margin-bottom: 1.25rem; }
  .weather-scroll {
    display: flex; gap: 10px; overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin; scrollbar-color: rgba(77,212,240,0.3) transparent;
  }
  .weather-scroll::-webkit-scrollbar { height: 4px; }
  .weather-scroll::-webkit-scrollbar-thumb { background: rgba(77,212,240,0.3); border-radius: 4px; }
  .weather-card {
    flex-shrink: 0;
    background: rgba(0,40,70,0.4);
    border: 1px solid rgba(77,212,240,0.2);
    border-radius: 14px; padding: 14px 12px;
    text-align: center; min-width: 88px;
    backdrop-filter: blur(8px);
  }
  .weather-card.trip-day {
    border-color: rgba(255,140,56,0.6);
    background: rgba(60,30,0,0.35);
  }
  .weather-date { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
  .weather-trip-badge { font-size: 9px; color: #ff8c38; letter-spacing: 0.05em; margin-bottom: 2px; }
  .weather-icon { font-size: 24px; line-height: 1.3; margin: 3px 0; }
  .weather-desc { font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
  .weather-temp { font-size: 13px; font-weight: 500; color: #fff; }
  .weather-temp span { color: rgba(255,255,255,0.4); font-size: 11px; }
  .weather-wave { font-size: 11px; color: #7de8ff; margin-top: 4px; font-family: 'DM Mono', monospace; }

function matchScore(m, q) {
  const ql = q.toLowerCase();
  const fields = m.aliases || [];
  for (const f of fields) {
    const fl = f.toLowerCase();
    if (fl === ql) return 100;
    if (fl.includes(ql) || ql.includes(fl)) return 80;
  }
  const combined = fields.join('').toLowerCase();
  if (ql.split('').every(ch => combined.includes(ch))) return 50;
  return 0;
}

function lookup() {
  const q = document.getElementById('nameInput').value.trim();
  const err = document.getElementById('errMsg');
  const suggest = document.getElementById('suggestList');
  if (!q) return;

  const scored = MEMBERS
    .map(m => ({ m, score: matchScore(m, q) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    err.style.display = 'block';
    suggest.innerHTML = '';
    suggest.style.display = 'none';
    document.getElementById('result').style.display = 'none';
    return;
  }
  err.style.display = 'none';

  if (scored.length === 1 || scored[0].score === 100) {
    suggest.style.display = 'none';
    renderResult(scored[0].m);
    return;
  }

  suggest.style.display = 'block';
  suggest.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">找到多筆結果，請選擇：</div>'
    + scored.map(({ m }) =>
        `<button class="suggest-item" onclick="pickPerson('${m.name}')">` +
        `${m.display}${m.aliases.length > 1 ? ` <span style='color:rgba(255,255,255,0.35);font-size:12px;'>（${m.aliases.slice(1).join(' / ')}）</span>` : ''}` +
        `</button>`
      ).join('');
  document.getElementById('result').style.display = 'none';
}

function pickPerson(name) {
  const person = MEMBERS.find(m => m.name === name);
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('nameInput').value = name;
  renderResult(person);
}

  const greenRoomHtml = p.green_room
    ? `<div class="room-name">${p.green_hotel === '綠邑旅宿' ? `<a href='https://maps.app.goo.gl/cd93PMxvoXEERoea8' target='_blank' style='color:inherit;text-decoration:none;border-bottom:1px solid rgba(77,212,240,0.4);'><svg width='11' height='11' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' style='margin-right:3px'><path d='M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z'/><circle cx='12' cy='10' r='3'/></svg>綠邑旅宿</a>` : p.green_hotel === '綠島九號精品渡假村' ? `<a href='https://maps.app.goo.gl/oXp8sYuBKR3T5AtTA' target='_blank' style='color:inherit;text-decoration:none;border-bottom:1px solid rgba(77,212,240,0.4);'><svg width='11' height='11' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' style='margin-right:3px'><path d='M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z'/><circle cx='12' cy='10' r='3'/></svg>綠島九號精品</a>` : p.green_hotel}</div><div class="room-type">${p.green_room}</div>${greenMatesHtml}`

  // 過濾行程：D0 只對 taitung_need=true 顯示；D1 包車項目同
  const visibleDays = ITINERARY.filter(day => {
    if (day.taitung_only && !p.taitung_need) return false;
    return true;
  });

  visibleDays.forEach((day, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i === 0 ? ' active' : '');
    tab.textContent = day.day;
    tab.onclick = () => switchDay(i);
    tabsEl.appendChild(tab);

    const dc = document.createElement('div');
    dc.className = 'day-content' + (i === 0 ? ' active' : '');
    dc.id = 'day-' + i;

    // 8/2 搭船者特殊處理（ferry_go 含 "8/2"）
    const isDay2Arrival = p.ferry_go.includes('8/2');
    // 08/03 水肺潛水成員
    const isScuba = SCUBA_DAY3.has(p.display);

    // 過濾 D1 包車項目：只對 taitung_need=true 顯示
    let visibleItems = day.items.filter(item => {
      if (item.taitung_item && !p.taitung_need) return false;
      return true;
    });

    // 8/2 搭船者：Day 2 頂部注入船班資訊
    if (isDay2Arrival && day.day === 'Day 2') {
      const timeMatch = p.ferry_go.match(/(\d{2}:\d{2})/);
      const ferryTime = timeMatch ? timeMatch[1] : '上午';
      visibleItems = [
        {
          time: ferryTime,
          text: `搭乘 <span style="color:#4dd4f0;font-weight:600;">${p.ferry_go}</span><br><span style="font-size:12px;color:rgba(255,255,255,0.4);">富岡漁港出發 → 綠島南寮港</span>`,

          _injected: true
        },

    if (isScuba && day.day === 'Day 3') {
      const injected = [];
      visibleItems.forEach(item => {
        // 07:40 民宿集合、08:00 岸潛 → 插在 10:00 自潛之前
        if (item.time === '10:00') {
          injected.push({
            time: '07:40',
            text: "民宿集合 <span class='tl-tag scuba'>水肺</span>",
            special: false, _scuba: true
          });
          injected.push({
            time: '08:00',
            text: "海角樂園潛店（中寮）集合 <span class='tl-tag scuba'>水肺</span><br><span style='font-size:12px;color:rgba(255,255,255,0.35);'>岸潛（測試潛）· 費用包含：氣瓶、導潛、配重、保險</span>",
            special: false, _scuba: true
          });
        }
        // 水肺成員跳過自由潛水項目（10:00 / 14:30）
        if (item.time === '10:00' || item.time === '14:30') return;
        injected.push(item);
        // 12:25 集合、12:45 船潛 → 插在午餐之後
        if (item.time === '中午') {
          injected.push({
            time: '12:25',
            text: "海角樂園潛店（中寮）集合 <span class='tl-tag scuba'>水肺</span>",
            special: false, _scuba: true
          });
          injected.push({
            time: '12:45',
            text: "由潛店帶領上船，船潛 × 2 <span class='tl-tag scuba'>水肺</span><br><span style='font-size:12px;color:rgba(255,255,255,0.35);'>地點依當天天氣而定 · 費用包含：氣瓶、導潛、配重、保險</span>",
            special: false, _scuba: true
          });
        }
      });
      visibleItems = injected;
    }

    let itemsHtml = visibleItems.map((item, j) => {
      const isLast = j === visibleItems.length - 1;
      // 把 {{SPOT:名稱}} 轉成可點擊按鈕
      const mapIcon = `<svg width='11' height='11' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' style='margin-right:3px'><path d='M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z'/><circle cx='12' cy='10' r='3'/></svg>`;
      // 個人化：船班行程自動帶入個人船票（非 8/2 搭船者）
      let rawText = item.text;
      let timeLabel = item.time;
      if (item.is_ferry_item && !isDay2Arrival) {
        const timeMatch = p.ferry_go.match(/(\d{2}:\d{2})/);
        if (timeMatch) timeLabel = timeMatch[1];
        rawText = `搭乘 <span style="color:#4dd4f0;font-weight:600;">${p.ferry_go}</span><br><span style="font-size:12px;color:rgba(255,255,255,0.4);">富岡漁港出發 → 綠島南寮港</span>`;
      }
      if (item.is_ferry_back_item) {
        const timeMatch = p.ferry_back.match(/(\d{2}:\d{2})/);
        if (timeMatch) timeLabel = timeMatch[1];
        rawText = `搭乘 <span style="color:#4dd4f0;font-weight:600;">${p.ferry_back}</span><br><span style="font-size:12px;color:rgba(255,255,255,0.4);">綠島南寮港出發 → 富岡漁港</span>`;
      }
      const renderedText = rawText.replace(/\{\{SPOT:([^}]+)\}\}/g, (_, name) =>
        `<button class='spot-btn' data-spot='${name}'>${mapIcon}${name}</button>`
      );
      return `<div class="tl-item">
        <div class="tl-time">${timeLabel}</div>
        <div class="tl-dot-wrap">
          <div class="tl-dot${item.special ? ' special' : ''}"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-text">${renderedText}</div>
      </div>`;
    }).join('');

    // 8/2 搭船者：Day 1 反灰 + 提示橫幅
    const isGrayedDay = isDay2Arrival && day.day === 'Day 1';
    const grayBanner = isGrayedDay
      ? `<div style="margin:8px 18px 4px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;font-size:11px;color:rgba(255,255,255,0.4);font-family:'DM Mono',monospace;">此日搭乘 8/2 船班，尚未抵達綠島</div>`
      : '';
    const grayStyle = isGrayedDay ? ' style="opacity:0.3;filter:grayscale(50%);pointer-events:none;"' : '';

    dc.innerHTML = `<div style="font-size:11px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.45);padding:10px 18px 2px;letter-spacing:0.06em;">${day.date} · ${day.label}</div>${grayBanner}<div class="timeline"${grayStyle}>${itemsHtml}</div>`;
    contentsEl.appendChild(dc);
  });

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  if (typeof renderChecklist === 'function') renderChecklist();
}

function switchDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.day-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

function resetView() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('nameInput').value = '';
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('suggestList').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
</script>

function renderChecklist() {

    el.innerHTML = items.map(item => `
      <div class="check-item" onclick="toggleCheck(this)">
        <div class="check-box"></div>
        <span>${item}</span>
      </div>`).join('');
    updateCount(key);

function toggleCheck(el) {
  el.classList.toggle('checked');
  const items = el.closest('.checklist-items');
  const key = items.id.replace('cl-', '');
  updateCount(key);
  updateTotalProgress();
}

function updateTotalProgress() {
  const all = document.querySelectorAll('.check-item');
  const done = document.querySelectorAll('.check-item.checked');
  const total = all.length, checked = done.length;
  const countEl = document.getElementById('totalProgressCount');
  const barEl = document.getElementById('totalProgressBar');
  if (countEl) countEl.textContent = `${checked} / ${total}`;
  if (barEl) barEl.style.width = total > 0 ? `${Math.round(checked/total*100)}%` : '0%';
}

function toggleCL(title) {
  title.classList.toggle('open');
  const items = title.nextElementSibling;
  items.classList.toggle('open');
}

function updateCount(key) {
  const items = document.querySelectorAll(`#cl-${key} .check-item`);
  const checked = document.querySelectorAll(`#cl-${key} .check-item.checked`);
  const cnt = document.getElementById(`cnt-${key}`);
  if (cnt) cnt.textContent = checked.length > 0 ? `${checked.length}/${items.length}` : `${items.length}`;
}

// renderChecklist 在 renderResult 末尾呼叫，完成後更新總進度
const _origRenderChecklist = renderChecklist;
renderChecklist = function() { _origRenderChecklist(); updateTotalProgress(); };

// ── ⑧ 瀏覽計數器 ─────────────────────────────────────
(async function initVisitCounter() {
  const NS = 'greendao2026';
  const todayKey = new Date().toISOString().slice(0, 10); // e.g. 2026-08-01
  const lsKey = `visit-today-${todayKey}`;

  // 今日（localStorage，此裝置當日累計，重新整理也算）
  const todayCount = (parseInt(localStorage.getItem(lsKey) || '0')) + 1;
  localStorage.setItem(lsKey, todayCount);
  document.getElementById('counterToday').textContent = todayCount.toLocaleString();

  // 總計（API，跨裝置真實累計）
  try {
    const res = await fetch(`https://api.counterapi.dev/v1/${NS}/total/up`);
    const data = await res.json();
    document.getElementById('counterTotal').textContent = Number(data.count).toLocaleString();
  } catch (e) {
    document.getElementById('counterTotal').textContent = '—';
  }
})();
</script>

<script>
// ── ① 倒數計時器 ──────────────────────────────────────
(function initCountdown() {
  const target = new Date('2026-08-01T00:00:00+08:00');
  const wrap = document.getElementById('countdownWrap');
  function update() {
    const diff = target - new Date();
    if (diff <= 0) {
      wrap.innerHTML = '<p class="cd-gone-msg">🤿 出發囉！今夏辣一波綠島！</p>';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    wrap.innerHTML = `<div class="countdown-wrap">
      <div class="cd-unit"><div class="cd-num">${String(d).padStart(2,'0')}</div><div class="cd-label">天</div></div>
      <div class="cd-unit"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-label">時</div></div>
      <div class="cd-unit"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-label">分</div></div>
      <div class="cd-unit"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-label">秒</div></div>
    </div>`;
    setTimeout(update, 1000);
  }
  update();
})();

// ── ④ 綠島天氣預報 (Open-Meteo) ──────────────────────
const WMO_MAP = {
  0:{i:'☀️',t:'晴'}, 1:{i:'🌤',t:'晴時多雲'}, 2:{i:'⛅',t:'多雲'}, 3:{i:'☁️',t:'陰'},
  45:{i:'🌫',t:'霧'}, 48:{i:'🌫',t:'霧'},
  51:{i:'🌦',t:'毛毛雨'}, 53:{i:'🌦',t:'細雨'}, 55:{i:'🌧',t:'小雨'},
  61:{i:'🌧',t:'小雨'}, 63:{i:'🌧',t:'中雨'}, 65:{i:'🌧',t:'大雨'},
  71:{i:'❄️',t:'小雪'}, 73:{i:'❄️',t:'中雪'}, 75:{i:'❄️',t:'大雪'},
  80:{i:'🌧',t:'陣雨'}, 81:{i:'🌧',t:'陣雨'}, 82:{i:'⛈',t:'強陣雨'},
  95:{i:'⛈',t:'雷雨'}, 96:{i:'⛈',t:'強雷雨'}, 99:{i:'⛈',t:'強雷雨'},
};
function wmoInfo(code) {
  return WMO_MAP[code] || WMO_MAP[Math.floor(code/10)*10] || {i:'🌡',t:'未知'};
}
(async function loadWeather() {
  const cardsEl = document.getElementById('weatherCards');
  try {
    const [w, marine] = await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast?latitude=22.6617&longitude=121.4931&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max&timezone=Asia%2FTaipei&forecast_days=7').then(r=>r.json()),
      fetch('https://marine-api.open-meteo.com/v1/marine?latitude=22.6617&longitude=121.4931&daily=wave_height_max&timezone=Asia%2FTaipei&forecast_days=7').then(r=>r.json()).catch(()=>null)
    ]);
    const TRIP_START = '2026-08-01', TRIP_END = '2026-08-04';
    const weekday = ['日','一','二','三','四','五','六'];
    cardsEl.innerHTML = w.daily.time.map((date, i) => {
      const isTrip = date >= TRIP_START && date <= TRIP_END;
      const d = new Date(date + 'T12:00:00+08:00');
      const label = `${d.getMonth()+1}/${d.getDate()}（${weekday[d.getDay()]}）`;
      const {i: icon, t: desc} = wmoInfo(w.daily.weathercode[i]);
      const tMax = Math.round(w.daily.temperature_2m_max[i]);
      const tMin = Math.round(w.daily.temperature_2m_min[i]);
      const wind = Math.round(w.daily.windspeed_10m_max[i]);
      const wave = marine?.daily?.wave_height_max?.[i];
      return `<div class="weather-card${isTrip?' trip-day':''}">
        <div class="weather-date">${label}</div>
        ${isTrip ? '<div class="weather-trip-badge">✦ 行程中 ✦</div>' : ''}
        <div class="weather-icon">${icon}</div>
        <div class="weather-desc">${desc}</div>
        <div class="weather-temp">${tMax}° <span>/ ${tMin}°</span></div>
        ${wave != null ? `<div class="weather-wave">🌊 ${wave.toFixed(1)}m</div>` : ''}
        <div class="weather-wind">💨 ${wind} km/h</div>
      </div>`;
    }).join('');
  } catch(e) {
    cardsEl.innerHTML = '<div class="notice-box" style="width:100%;flex-shrink:0;">天氣資料暫時無法載入</div>';
  }
})();

// ── ⑥ 全員船班總覽 ────────────────────────────────────
(function renderFerryOverview() {
  // 以「去程 + 回程」組合分組
  const comboMap = {};
  MEMBERS.forEach(m => {
    const key = m.ferry_go + '|||' + m.ferry_back;
    if (!comboMap[key]) comboMap[key] = { ferry_go: m.ferry_go, ferry_back: m.ferry_back, members: [] };
    comboMap[key].members.push(m.display);
  });

  // 排序：先顯示有八月的組，其餘依去程時間
  const groups = Object.values(comboMap).sort((a, b) => {
    const aA = a.members.includes('八月'), bA = b.members.includes('八月');
    if (aA && !bA) return -1;
    if (!aA && bA) return 1;
    return a.ferry_go.localeCompare(b.ferry_go, 'zh-TW');
  });

  // 各組指定小領隊 / 副隊長（key = ferry_go|||ferry_back）
  const ROLE_MAP = {
    '台東→綠島 09:30（天王星 S0930）|||綠島→台東 14:30（綠星2號 G21430）': { leader:'八月', deputy:'阿緯' },
    '台東→綠島 09:30（天王星 S0930）|||綠島→台東 10:30（天王星 S1030）':   { leader:'小竣' },
    '台東→綠島 09:30（天王星 S0930）|||綠島→台東 12:30（綠星2號 G21230）': { leader:'許凱' },
    '台東→綠島 13:30（綠星2號 G21330）|||綠島→台東 14:30（綠星2號 G21430）': { leader:'阿文' },
    '8/2 台東→綠島 07:30（天王星 S0730）|||綠島→台東 14:30（綠星2號 G21430）': { leader:'奕方' },
  };

  const rows = groups.map(g => {
    const comboKey = g.ferry_go + '|||' + g.ferry_back;
    const roles = ROLE_MAP[comboKey] || {};
    const leader = roles.leader || null;
    const deputy = roles.deputy || null;
    // 排序：小領隊 → 副隊長 → 其他
    const sortedMembers = [...g.members].sort((a, b) => {
      const rankA = a === leader ? 0 : a === deputy ? 1 : 2;
      const rankB = b === leader ? 0 : b === deputy ? 1 : 2;
      return rankA - rankB;
    });
    const memberTags = sortedMembers.map(n => {
      if (n === leader) {
        return `<span class="fo-name-tag fo-leader">${n}</span>`;
      }
      if (n === deputy) {
        return `<span class="fo-name-tag fo-deputy">${n}</span>`;
      }
      return `<span class="fo-name-tag">${n}</span>`;
    }).join('');

    return `
      <div class="ferry-row-ov ferry-combo-group">
        <div class="ferry-combo-header">
          <div>
            <span class="fo-badge go">去程</span>
            <span class="fo-ferry-name">${g.ferry_go}</span>
          </div>
          <span class="ferry-combo-divider">▸</span>
          <div>
            <span class="fo-badge back">回程</span>
            <span class="fo-ferry-name">${g.ferry_back}</span>
          </div>
          <span class="fo-count" style="margin-left:auto;">${g.members.length} 人</span>
        </div>
        <div class="fo-names">${memberTags}</div>
      </div>`;
  }).join('');

  document.getElementById('ferryBody').innerHTML = rows;
})();

function toggleFerryOverview() {
  const toggle = document.getElementById('ferryToggle');
  const body = document.getElementById('ferryBody');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}
