<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 今夏辣一波綠島 🤿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #0a4a6e;
    --ocean-mid: #1a7a9a;
    --ocean-light: #5bbcd6;
    --foam: #e8f7fc;
    --sand: #f5f0e8;
    --sand-dark: #d4c9b0;
    --coral: #e05a3a;
    --coral-light: #f5c4b5;
    --ink: #1a1a2e;
    --muted: #7a8a9a;
    --white: #ffffff;
    --success: #2d8a5e;
    --success-bg: #e6f5ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--ink);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-wrap {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, #0a1628 0%, #0a3a5a 50%, #0a2a1a 100%);
    overflow: hidden;
  }
  .wave {
    position: absolute; width: 200%; height: 200%;
    border-radius: 45%;
    animation: wave-spin linear infinite;
    opacity: 0.04;
  }
  .wave-1 { background: var(--ocean-light); bottom: -80%; left: -50%; animation-duration: 18s; }
  .wave-2 { background: #2dd4bf; bottom: -85%; left: -40%; animation-duration: 25s; animation-direction: reverse; }
  .wave-3 { background: var(--ocean-mid); bottom: -90%; left: -60%; animation-duration: 32s; }
  @keyframes wave-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  .page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 4rem 1rem 3rem;
  }
  .hero-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ocean-light);
    border: 1px solid rgba(91,188,214,0.4);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 0.5rem;
  }
  .hero h1 span { color: var(--ocean-light); }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    margin-bottom: 2.5rem;
  }

  /* ── SEARCH BOX ── */
  .search-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2rem;
    backdrop-filter: blur(12px);
    max-width: 420px;
    margin: 0 auto;
  }
  .search-label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
    display: block;
  }
  .search-row { display: flex; gap: 8px; }
  .search-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input::placeholder { color: rgba(255,255,255,0.25); }
  .search-row input:focus { border-color: var(--ocean-light); }
  .search-btn {
    background: var(--ocean-light);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #7dd4eb; }
  .search-btn:active { transform: scale(0.97); }

  .error-msg {
    margin-top: 10px;
    font-size: 13px;
    color: #f5a4a4;
    display: none;
  }

  /* ── RESULT ── */
  #result { margin-top: 2rem; display: none; }

  .person-header {
    display: flex; align-items: center; gap: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--ocean-mid), var(--ocean-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: white;
    font-family: 'Noto Serif TC', serif;
    flex-shrink: 0;
  }
  .person-name { font-size: 20px; font-weight: 600; font-family: 'Noto Serif TC', serif; }
  .person-meta { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* ── SECTION ── */
  .section { margin-bottom: 1.25rem; }
  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ocean-light);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    overflow: hidden;
  }
  .card-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .card-row:last-child { border-bottom: none; }

  .badge {
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 8px;
    font-weight: 500; white-space: nowrap; flex-shrink: 0;
  }
  .badge-go { background: rgba(91,188,214,0.15); color: var(--ocean-light); border: 1px solid rgba(91,188,214,0.3); }
  .badge-back { background: rgba(224,90,58,0.15); color: #f0956f; border: 1px solid rgba(224,90,58,0.3); }
  .badge-tbd { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35); border: 1px solid rgba(255,255,255,0.1); }

  .row-main { font-size: 15px; font-weight: 500; }
  .row-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .room-cell {
    padding: 16px 18px;
    border-right: 1px solid rgba(255,255,255,0.06);
    border-bottom: none;
  }
  .room-cell:last-child { border-right: none; }
  .room-label { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.35); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
  .room-name { font-size: 15px; font-weight: 500; }
  .room-type { font-size: 12px; color: var(--ocean-light); margin-top: 3px; }
  .room-tbd { font-size: 14px; color: rgba(255,255,255,0.25); font-style: italic; }
  .room-mates { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px; }

  /* ── ITINERARY ── */
  .days-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .day-tab {
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 6px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: rgba(255,255,255,0.45);
    cursor: pointer; transition: all 0.15s;
  }
  .day-tab.active, .day-tab:hover {
    background: var(--ocean-light); color: var(--ink);
    border-color: var(--ocean-light); font-weight: 500;
  }
  .day-content { display: none; }
  .day-content.active { display: block; }

  .timeline { padding: 4px 0; }
  .tl-item {
    display: flex; gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    align-items: flex-start;
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-time {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--ocean-light); min-width: 44px; padding-top: 2px;
    flex-shrink: 0;

  .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 6px; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ocean-light); flex-shrink: 0; }
  .tl-dot.special { background: var(--coral); width: 10px; height: 10px; }
  .tl-line { width: 1px; flex: 1; background: rgba(255,255,255,0.1); min-height: 20px; margin-top: 4px; }
  .tl-text { font-size: 14px; line-height: 1.5; }
  .tl-text strong { color: var(--ocean-light); font-weight: 500; }
  .tl-tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px;
    margin-left: 6px; vertical-align: middle;
    background: rgba(91,188,214,0.12); color: var(--ocean-light);
    border: 1px solid rgba(91,188,214,0.2);
  }
  .tl-tag.event { background: rgba(224,90,58,0.12); color: #f0956f; border-color: rgba(224,90,58,0.2); }

  .notice-box {
    background: rgba(91,188,214,0.08);
    border: 1px solid rgba(91,188,214,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    font-style: italic;
  }

  /* ── FOOTER / RESET ── */
  .reset-btn {
    display: block; width: 100%; margin-top: 2rem;
    background: transparent; border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.35); border-radius: 12px;
    padding: 12px; font-size: 13px; font-family: 'Outfit', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }

  .suggest-list {
    margin-top: 10px; display: none;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 10px;
  }
  .suggest-item {
    display: block; width: 100%;
    background: transparent; border: none;
    color: var(--white); font-family: 'Outfit', sans-serif;
    font-size: 14px; text-align: left;
    padding: 9px 12px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
  }
  .suggest-item:hover { background: rgba(91,188,214,0.12); }

</head>

// ── 查詢邏輯 ─────────────────────────────────────────
function matchScore(m, q) {
  const fields = [m.name, m.alias].filter(Boolean);
  for (const f of fields) {
    if (f === q) return 100;
    if (f.includes(q) || q.includes(f)) return 80;
  }
  const combined = fields.join('');
  if (q.split('').every(ch => combined.includes(ch))) return 50;
  return 0;
}

function lookup() {
  const q = document.getElementById('nameInput').value.trim();
  const err = document.getElementById('errMsg');
  const suggest = document.getElementById('suggestList');
  if (!q) return;

  const scored = MEMBERS
    .map(m => ({ m, score: matchScore(m, q) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    err.style.display = 'block';
    suggest.innerHTML = '';
    suggest.style.display = 'none';
    document.getElementById('result').style.display = 'none';
    return;
  }
  err.style.display = 'none';

  if (scored.length === 1 || scored[0].score === 100) {
    suggest.style.display = 'none';
    renderResult(scored[0].m);
    return;
  }

  suggest.style.display = 'block';
  suggest.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">找到多筆結果，請選擇：</div>'
    + scored.map(({ m }) =>
        `<button class="suggest-item" onclick="pickPerson('${m.name}')">` +
        `${m.name}${m.alias ? ` <span style='color:rgba(255,255,255,0.35);font-size:12px;'>（${m.alias}）</span>` : ''}` +
        `</button>`
      ).join('');
  document.getElementById('result').style.display = 'none';
}

function pickPerson(name) {
  const person = MEMBERS.find(m => m.name === name);
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('nameInput').value = name;
  renderResult(person);
}

    : `<div class="room-tbd">不需台東住宿</div>`;
  // 建立本名(綽號)對照
  const ALIAS_MAP = {"賴昶佑": "八月", "林詩豪": "詩豪", "曾獻生": "雞腿", "郭旭東": "可樂", "林群晏": "小晏", "謝宗庭": "阿金", "葉竣銘": "小竣", "古名尊": "小古", "謝鈞任": "大大", "林和億": "和億", "謝紳泉": "泉", "周珈佑": "珈佑", "楊貴智": "貴智", "蘇奕翰": "奕翰", "孫聖峰": "聖峰", "劉家齊": "Alvin", "曾耀男": "Felix", "謝明哲": "Pio", "卓彥廷": "黑", "洪煒晴": "煒晴", "陳奕方": "奕方", "李任翔": "Volten", "陳泓文": "阿文", "吳政軒": "軒哥", "程科諺": "科諺", "施俊仰": "Jerry", "謝金融": "CJ", "陳瑞廷": "阿廷", "林承緯": "阿緯", "徐丞逸": "小丞", "周民哲": "阿哲", "鐘元志": "鐘元志", "曾振瑋": "振瑋", "石培鑫": "大興", "許凱証": "表哥", "林育詳": "Alex", "李啓彰": "阿彰", "周子翔": "Box", "李承哲": "Jebou", "趙偉志": "石頭", "黃文廷": "昂扣", "徐士清": "Jacky", "郭曜瑋": "瑋瑋", "許任廷": "小任", "吳艾倫": "Allen", "戴語絜": "娜娜", "白羽涵": "小白"};
  function formatMate(n) {
    const a = ALIAS_MAP[n];
    return a && a !== n ? n + '(' + a + ')' : n;
  }
  const greenMatesHtml = p.green_mates && p.green_mates.length > 0
    ? `<div class="room-mates">同房：${p.green_mates.map(formatMate).join('、')}</div>`
    : p.green_room && p.green_room !== '待補' ? `<div class="room-mates" style="color:rgba(255,255,255,0.25);">室友待補</div>` : '';
  const greenRoomHtml = p.green_room
    ? `<div class="room-name">${p.green_hotel}</div><div class="room-type">${p.green_room}</div>${greenMatesHtml}`
    : `<div class="room-name">${p.green_hotel}</div><div class="room-type" style="color:rgba(255,255,255,0.3);">配房待補</div>`;
  rg.innerHTML = `
    <div class="room-cell">
      <div class="room-label">台東 · 7/31</div>
      ${taitungHtml}
    </div>
    <div class="room-cell">
      <div class="room-label">綠島 · 8/1–8/4</div>
      ${greenRoomHtml}
    </div>`;

  // itinerary
  const tabsEl = document.getElementById('dayTabs');
  const contentsEl = document.getElementById('dayContents');
  tabsEl.innerHTML = '';
  contentsEl.innerHTML = '';

  // 過濾行程：D0 只對 taitung_need=true 顯示；D1 包車項目同
  const visibleDays = ITINERARY.filter(day => {
    if (day.taitung_only && !p.taitung_need) return false;
    return true;
  });

  visibleDays.forEach((day, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i === 0 ? ' active' : '');
    tab.textContent = day.day + ' ' + day.date;
    tab.onclick = () => switchDay(i);
    tabsEl.appendChild(tab);

    const dc = document.createElement('div');
    dc.className = 'day-content' + (i === 0 ? ' active' : '');
    dc.id = 'day-' + i;

    // 過濾 D1 包車項目：只對 taitung_need=true 顯示
    const visibleItems = day.items.filter(item => {
      if (item.taitung_item && !p.taitung_need) return false;
      return true;
    });

    let itemsHtml = visibleItems.map((item, j) => {
      const isLast = j === visibleItems.length - 1;
      return `<div class="tl-item">
        <div class="tl-time">${item.time}</div>
        <div class="tl-dot-wrap">
          <div class="tl-dot${item.special ? ' special' : ''}"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-text">${item.text}</div>
      </div>`;
    }).join('');

    dc.innerHTML = `<div class="timeline">${itemsHtml}</div>`;
    contentsEl.appendChild(dc);
  });

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.day-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

function resetView() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('nameInput').value = '';
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('suggestList').style.display = 'none';
  document.getElementById('suggestList').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});
</script>
</body>
</html>
